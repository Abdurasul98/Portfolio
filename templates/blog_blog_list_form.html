<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blogs List</title>
</head>
<body>
<h1>All Blogs</h1>

<ul>
    {% for blog in blogs %}
        <li>
            {{ blog.title }}
            <a href="{% url 'blog_blog_update_form' blog.pk %}">Edit</a>
            <a href="{% url 'blog_blog_delete_form' blog.pk %}">Delete</a>
        </li>
    {% empty %}
        <li>No blogs yet.</li>
    {% endfor %}
</ul>

<a href="{% url 'blog_blog_create_form' %}">Create New Blog</a>
<br>
<a href="{% url 'admin_index' %}">Back to Admin Menu</a>
<br>
<a href="{% url 'logout' %}">Logout</a>
</body>
</html>
